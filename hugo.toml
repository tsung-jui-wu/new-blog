baseURL = "https://tsung-jui-wu.github.io/blog"
languageCode = "en-us"
title = "Tsung-Jui's Blog"
theme = "hugo-theme-stack"
paginatePath = "page"
paginate = 5

[params]
  mainSections = ["posts"]
  featuredImageField = "image"
  rssFullContent = true

  [params.footer]
    since = 2024

  [params.dateFormat]
    published = "Jan 02, 2006"
    lastUpdated = "Jan 02, 2006 15:04 MST"

  [params.sidebar]
    emoji = "🖥️"
    subtitle = "tech, thoughts & things close to heart"
    avatar.enabled = true
    avatar.local = true
    avatar.src = "img/avatar.jpg"

  [params.article]
    math = false
    toc = true
    readingTime = true
    license.enabled = false

  [params.comments]
    enabled = false

  [params.colorScheme]
    toggle = true
    default = "auto"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1
    [menu.main.params]
      icon = "home"

  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts"
    weight = 2
    [menu.main.params]
      icon = "archives"

  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags"
    weight = 3
    [menu.main.params]
      icon = "tag"

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about"
    weight = 4
    [menu.main.params]
      icon = "user"
